name: Build Portable Zip

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.0.1 (optional)"
        required: false
        default: ""
      create_release:
        description: "Create/Update GitHub Release"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  build-portable:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish (Portable Multi-file)
        run: dotnet publish WinLinkManager.App -c Release -o publish

      - name: Remove Debug Symbols
        run: |
          Get-ChildItem publish -File -Filter *.pdb -Recurse -ErrorAction SilentlyContinue | Remove-Item -Force

      - name: Package Zip
        id: package
        run: |
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq "${{ github.event.repository.default_branch }}") {
            $version = "${{ inputs.version }}"
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "manual-${{ github.run_number }}"
          }

          $zipName = "WinLinkManager-portable-$version.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path publish\* -DestinationPath $zipName -Force

          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_name }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true && inputs.version != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.version }}
          name: WinLinkManager ${{ steps.package.outputs.version }}
          body: |
            Portable build package.
            - Publish command: `dotnet publish WinLinkManager.App -c Release -o publish`
            - Run `WinLinkManager.App.exe` as Administrator
          files: ${{ steps.package.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
